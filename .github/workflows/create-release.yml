name: Create Release and Update Cask

on:
  push:
    tags:
      - 'v*'

jobs:
  release-and-update-cask:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
    - name: Checkout full repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

    - name: Build Release (Apple Silicon)
      run: swift build -c release

    - name: Create App Bundle
      run: |
        bash build-app-bundle.sh

    - name: Package App
      run: zip -r Monthage.app.zip Monthage.app

    - name: Calculate SHA256
      id: sha
      run: |
        SHA256=$(shasum -a 256 Monthage.app.zip | awk '{ print $1 }')
        echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: "Release ${{ steps.get_version.outputs.VERSION }}"
        files: Monthage.app.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Switch to main branch
      run: git checkout main

    - name: Update Cask File
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        SHA256="${{ steps.sha.outputs.sha256 }}"
        
        echo 'cask "monthage" do' > Casks/monthage.rb
        echo "  version \"$VERSION\"" >> Casks/monthage.rb
        echo "  sha256 \"$SHA256\"" >> Casks/monthage.rb
        echo "" >> Casks/monthage.rb
        echo "  url \"https://github.com/aarizkuren/monthage/releases/download/v#{version}/Monthage.app.zip\"" >> Casks/monthage.rb
        echo "" >> Casks/monthage.rb
        echo "  name \"Monthage\"" >> Casks/monthage.rb
        echo "  desc \"Menubar app showing month progress percentage\"" >> Casks/monthage.rb
        echo "  homepage \"https://github.com/aarizkuren/monthage\"" >> Casks/monthage.rb
        echo "" >> Casks/monthage.rb
        echo "  livecheck do" >> Casks/monthage.rb
        echo "    url :url" >> Casks/monthage.rb
        echo "    strategy :github_latest" >> Casks/monthage.rb
        echo "  end" >> Casks/monthage.rb
        echo "" >> Casks/monthage.rb
        echo "  app \"Monthage.app\"" >> Casks/monthage.rb
        echo "end" >> Casks/monthage.rb

    - name: Commit Updated Cask
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Casks/monthage.rb
        git commit -m "chore: update cask to version ${{ steps.get_version.outputs.VERSION }}"
        git push origin main